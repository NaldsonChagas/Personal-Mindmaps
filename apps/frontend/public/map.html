<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mind Map Editor — Personal MindMaps</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/tokens.css" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/pages.css" />
  <link rel="stylesheet" href="/node_modules/mind-elixir/dist/MindElixir.css" />
  <script src="https://unpkg.com/lucide@latest" defer></script>
</head>
<body>
  <header class="editor-header">
    <div class="editor-header-left">
      <button id="back-btn" class="btn btn-ghost btn-sm" aria-label="Back to list page">
        <i data-lucide="arrow-left"></i>
        Back
      </button>
      <div class="logo" style="display:flex;align-items:center;gap:var(--space-2);">
        <img src="/assets/logo.svg" alt="" width="20" height="20" />
      </div>
    </div>

    <div class="editor-header-center">
      <span id="editor-title-display" class="editor-title-display" role="textbox" tabindex="0" aria-label="Mind map title">Loading...</span>
      <input id="editor-title-input" class="editor-title hidden" type="text" maxlength="255" aria-label="Edit mind map title" />
    </div>

    <div class="editor-header-right">
      <span id="save-badge" class="save-badge saved">Saved</span>
      <button id="save-btn" class="btn btn-primary btn-sm" disabled aria-label="Save mind map">
        <i data-lucide="save"></i>
        Save
      </button>
    </div>
  </header>

  <main class="editor-page">
    <section class="editor-topbar">
      <span style="font-size:12px;color:var(--color-text-muted);">Click nodes to edit. Drag to rearrange.</span>
      <span style="flex:1"></span>
      <button id="export-btn" class="btn btn-ghost btn-sm" aria-label="Export as PNG">
        <i data-lucide="download"></i>
        Export PNG
      </button>
    </section>

    <section class="editor-shell">
      <div id="mind-map-editor"></div>
    </section>
  </main>

  <script src="/node_modules/mind-elixir/dist/MindElixir.iife.js"></script>
  <script src="/config.js"></script>
  <script type="module" src="/js/map-page.js"></script>
</body>
</html>
