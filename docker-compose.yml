services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - '${POSTGRES_PORT}:5432'
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile.dev
    restart: unless-stopped
    ports:
      - '${BACKEND_PORT}:3000'
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PORT: 3000
      NODE_ENV: development
    volumes:
      - ./apps/backend/src:/app/apps/backend/src:ro
      - ./apps/backend/tsconfig.json:/app/apps/backend/tsconfig.json:ro
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile.dev
    restart: unless-stopped
    ports:
      - '${FRONTEND_PORT}:4000'
    environment:
      API_URL: ${API_URL}
      PORT: 4000
      NODE_ENV: development
    volumes:
      - ./apps/frontend/public:/app/apps/frontend/public:ro
      - ./apps/frontend/server.js:/app/apps/frontend/server.js:ro
    depends_on:
      - backend
